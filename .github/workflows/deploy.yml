name: Build & Deploy to Firebase Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '22.23.1'
  FIREBASE_PROJECT_ID: milabuddycare

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Inject production environment config
        run: |
          cat > src/environments/environment.prod.ts << 'EOF'
          import { Environment } from './environment.model';

          export const environment: Environment = {
            production: true,
            useEmulators: false,
            firebase: {
              apiKey: '${{ secrets.FIREBASE_API_KEY }}',
              authDomain: '${{ secrets.FIREBASE_AUTH_DOMAIN }}',
              projectId: '${{ secrets.FIREBASE_PROJECT_ID }}',
              storageBucket: '${{ secrets.FIREBASE_STORAGE_BUCKET }}',
              messagingSenderId: '${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}',
              appId: '${{ secrets.FIREBASE_APP_ID }}',
              measurementId: '${{ secrets.FIREBASE_MEASUREMENT_ID }}',
            },
            emulators: {
              auth:      { host: 'localhost', port: 9099 },
              firestore: { host: 'localhost', port: 8080 },
              functions: { host: 'localhost', port: 5001 },
              storage:   { host: 'localhost', port: 9199 },
            },
            logging: { level: 'error' },
          };
          EOF

      - name: Build Angular (production)
        run: npm run build -- --configuration production
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Write Firebase service account credentials
        run: echo "$FIREBASE_SA_JSON" > "$RUNNER_TEMP/firebase-sa.json"
        env:
          FIREBASE_SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools@latest deploy --only hosting --project ${{ env.FIREBASE_PROJECT_ID }}
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json

      - name: Remove Firebase service account credentials
        if: always()
        run: rm -f "$RUNNER_TEMP/firebase-sa.json"
